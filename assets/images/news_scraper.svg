<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <linearGradient id="paper" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1e2e"/>
      <stop offset="100%" style="stop-color:#16162a"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softshadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="4" dy="6" stdDeviation="8" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="600" height="400" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <g opacity="0.04" stroke="#ff6600" stroke-width="1">
    <line x1="0" y1="80" x2="600" y2="80"/>
    <line x1="0" y1="160" x2="600" y2="160"/>
    <line x1="0" y1="240" x2="600" y2="240"/>
    <line x1="0" y1="320" x2="600" y2="320"/>
    <line x1="150" y1="0" x2="150" y2="400"/>
    <line x1="300" y1="0" x2="300" y2="400"/>
    <line x1="450" y1="0" x2="450" y2="400"/>
  </g>

  <!-- Newspaper body -->
  <rect x="80" y="50" width="440" height="300" rx="6" fill="url(#paper)" filter="url(#softshadow)"/>

  <!-- HN orange masthead bar -->
  <rect x="80" y="50" width="440" height="52" rx="6" fill="#ff6600"/>
  <rect x="80" y="84" width="440" height="18" fill="#ff6600"/>

  <!-- Masthead text: Y logo box -->
  <rect x="96" y="60" width="32" height="32" rx="3" fill="#fff"/>
  <text x="112" y="82" font-family="Georgia, serif" font-size="22" font-weight="bold"
        fill="#ff6600" text-anchor="middle">Y</text>

  <!-- Masthead title -->
  <text x="148" y="72" font-family="Georgia, 'Times New Roman', serif" font-size="15"
        font-weight="bold" fill="#fff" letter-spacing="2">HACKER NEWS</text>
  <text x="148" y="87" font-family="monospace" font-size="9" fill="rgba(255,255,255,0.7)"
        letter-spacing="1">SCRAPER EDITION</text>

  <!-- Date / edition line -->
  <text x="480" y="72" font-family="monospace" font-size="9" fill="rgba(255,255,255,0.6)"
        text-anchor="end">Vol. 1 — 2026</text>

  <!-- Divider -->
  <line x1="96" y1="116" x2="504" y2="116" stroke="#ff6600" stroke-width="1.5" opacity="0.4"/>

  <!-- Main headline -->
  <text x="96" y="140" font-family="Georgia, 'Times New Roman', serif" font-size="18"
        font-weight="bold" fill="#e2e8f0">Ask HN: What are people building</text>
  <text x="96" y="160" font-family="Georgia, 'Times New Roman', serif" font-size="18"
        font-weight="bold" fill="#e2e8f0">with AI these days?</text>

  <!-- Subheadline line -->
  <text x="96" y="178" font-family="monospace" font-size="9" fill="#ff6600">
    482 points · 3 hours ago · 294 comments
  </text>

  <!-- Divider -->
  <line x1="96" y1="190" x2="504" y2="190" stroke="#333355" stroke-width="1"/>

  <!-- Article rows -->
  <!-- Row 1 -->
  <rect x="96" y="200" width="18" height="18" rx="2" fill="#ff6600" opacity="0.15"/>
  <text x="105" y="213" font-family="monospace" font-size="10" fill="#ff6600"
        text-anchor="middle" font-weight="bold">1</text>
  <text x="122" y="213" font-family="'Inter', system-ui, sans-serif" font-size="11"
        fill="#c9d1d9">Show HN: I built a full-stack news aggregator with MongoDB</text>
  <text x="122" y="226" font-family="monospace" font-size="8" fill="#555577">
    312 pts · saved · 41 comments
  </text>

  <!-- Row 2 -->
  <rect x="96" y="238" width="18" height="18" rx="2" fill="#ff6600" opacity="0.12"/>
  <text x="105" y="251" font-family="monospace" font-size="10" fill="#ff6600"
        text-anchor="middle">2</text>
  <text x="122" y="251" font-family="'Inter', system-ui, sans-serif" font-size="11"
        fill="#c9d1d9">The architecture of scrapers that actually work</text>
  <text x="122" y="264" font-family="monospace" font-size="8" fill="#555577">
    198 pts · saved · 87 comments
  </text>

  <!-- Row 3 -->
  <rect x="96" y="276" width="18" height="18" rx="2" fill="#ff6600" opacity="0.09"/>
  <text x="105" y="289" font-family="monospace" font-size="10" fill="#ff6600"
        text-anchor="middle">3</text>
  <text x="122" y="289" font-family="'Inter', system-ui, sans-serif" font-size="11"
        fill="#c9d1d9">Express + Cheerio + Algolia: the underrated stack</text>
  <text x="122" y="302" font-family="monospace" font-size="8" fill="#555577">
    144 pts · 52 comments
  </text>

  <!-- Bottom rule -->
  <line x1="96" y1="318" x2="504" y2="318" stroke="#333355" stroke-width="1"/>
  <text x="300" y="334" font-family="monospace" font-size="8" fill="#444466"
        text-anchor="middle">[ more ] [ favorites ] [ search ]</text>

  <!-- Glow accent dots -->
  <circle cx="510" cy="110" r="3" fill="#ff6600" opacity="0.6" filter="url(#glow)"/>
  <circle cx="523" cy="110" r="3" fill="#ff6600" opacity="0.4" filter="url(#glow)"/>
  <circle cx="536" cy="110" r="3" fill="#ff6600" opacity="0.2"/>
</svg>
